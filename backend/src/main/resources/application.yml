server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: pki-souverain-backend
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:true}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 200MB

  # Base de donnÃƒÂ©es PostgreSQL
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      initialization-fail-timeout: 60000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
        boot:
          allow_jdbc_metadata_access: false
        jdbc:
          time_zone: UTC

  # Email (configuration SMTP pour tokens de validation)
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
    default-encoding: UTF-8

# Configuration PKI
pki:
  # Frontend URL for email links
  frontend:
    url: ${FRONTEND_URL:http://localhost:5173}
  
  # Email
  email:
    debug-mode: ${PKI_EMAIL_DEBUG_MODE:false}
    brevo-api-key: ${BREVO_API_KEY:}

  # SMS (Brevo Transactional SMS — même clé API que l'email)
  sms:
    sender: ${PKI_SMS_SENDER:ANTIC}

  # Session timeout par inactivité (en minutes)
  session:
    timeout-minutes: ${PKI_SESSION_TIMEOUT_MINUTES:480}

  # Bootstrap du premier administrateur (laisser vide pour desactiver)
  bootstrap:
    admin:
      email: ${PKI_BOOTSTRAP_ADMIN_EMAIL:}
      password: ${PKI_BOOTSTRAP_ADMIN_PASSWORD:}
      first-name: ${PKI_BOOTSTRAP_ADMIN_FIRST_NAME:Administrateur}
      last-name: ${PKI_BOOTSTRAP_ADMIN_LAST_NAME:Systeme}
  
  # OpenSSL
  openssl:
    binary: /usr/bin/openssl
  
  # Chemins de stockage
  ca:
    root-path: /opt/pki/ca
    certs-path: /opt/pki/certs
    crl-path: /opt/pki/crl
    keystore-password-env: ${PKI_CA_KEYSTORE_PASSWORD_ENV:PKI_CA_KEYSTORE_PASSWORD}
    default-keystore-password: ${PKI_CA_DEFAULT_KEYSTORE_PASSWORD:}
  
  # JWT
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000           # 60 minutes (en ms)
    refresh-expiration: 604800000  # 7 jours (en ms)
  
  # Configuration AC par dÃƒÂ©faut
  ca-defaults:
    name: "AutoritÃƒÂ© de Certification Souveraine"
    validity-years: 10
    key-size: 4096
    algorithm: RSA
  # Paiement SharePay (Mobile Money)
  payment:
    amount: ${PKI_PAYMENT_AMOUNT:5000}
    currency: ${PKI_PAYMENT_CURRENCY:XAF}
    sharepay:
      api-key: ${SHAREPAY_API_KEY:}
      webhook-secret: ${SHAREPAY_WEBHOOK_SECRET:}

  # Validation IA des pieces d'identite
  identity-ai:
    provider: ${PKI_ID_AI_PROVIDER:heuristic}      # heuristic | google | local
    strict-mode: ${PKI_ID_AI_STRICT_MODE:false}    # false: n bloque pas en cas de doute
    google:
      api-key: ${PKI_ID_AI_GOOGLE_API_KEY:}
    local:
      url: ${PKI_ID_AI_LOCAL_URL:http://localhost:8000/validate}
      api-key: ${PKI_ID_AI_LOCAL_API_KEY:}
      retries: ${PKI_ID_AI_LOCAL_RETRIES:3}
      retry-delay-ms: ${PKI_ID_AI_LOCAL_RETRY_DELAY_MS:1500}
      warmup-enabled: ${PKI_ID_AI_LOCAL_WARMUP_ENABLED:true}

# Actuator (Monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    cm.gov.pki: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate: WARN
    com.zaxxer.hikari: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

